# ── Active config (edit this section) ────────────────────────────────────────

categories:
  - cs.CV
  - cs.AI
  - cs.LG
  - eess.IV
  - cs.MA

must_include:
  - computer vision
  - large language model
  - vision language model
  - diffusion model
  - foundation model
  - agent
  - orchestration
  - agentic
  - multimodal
  - hallucination
  - medical imaging
  - chest X-ray
  - report generation
  - world model

boost_keywords:
  - VLM
  - SAM
  - ViT
  - CLIP
  - zero-shot
  - few-shot
  - medical image
  - MRI
  - CT scan
  - radiology
  - histology

llm_score_threshold: 7
